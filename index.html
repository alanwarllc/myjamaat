function getAdminSections(role) {
  if (role === "leadership") {
    return [
      { title: "Overview", items: [{ id: "dashboard", label: "Dashboard", icon: LayoutDashboard }] },
      { title: "12 umoor", items: umoorList.map((u) => ({ id: u.id, label: u.name, icon: u.icon })) },
      { title: "Operations", items: [
        { id: "tasks", label: "Task manager", icon: ClipboardList },
        { id: "reimbursements", label: "Reimbursements", icon: Receipt },
        { id: "reports", label: "Reports", icon: FileBarChart },
        { id: "meetings", label: "Meeting minutes", icon: CalendarDays },
        { id: "gallery", label: "Gallery", icon: Image },
        { id: "team", label: "Team & access", icon: UserCog },
      ]},
      { title: "Collaboration", items: [{ id: "crossumoor", label: "Cross-umoor", icon: Share2 }] },
    ];
  }
  if (roleUmoorMap[role]) {
    const scopedId = roleUmoorMap[role];
    const u = umoorList.find((u) => u.id === scopedId);
    const items = [{ id: u.id, label: u.name, icon: u.icon }];
    const opsItems = [
      { id: "tasks", label: "Task manager", icon: ClipboardList },
      { id: "reimbursements", label: "Reimbursements", icon: Receipt },
      { id: "reports", label: "Reports", icon: FileBarChart },
      { id: "meetings", label: "Meeting minutes", icon: CalendarDays },
    ];
    if (role === "treasurer") {
      opsItems.splice(2, 0, { id: "treasury", label: "All umoor finances", icon: Wallet });
    }
    return [
      { title: "Your umoor", items },
      { title: "Operations", items: opsItems },
      { title: "Collaboration", items: [{ id: "crossumoor", label: "Cross-umoor", icon: Share2 }] },
    ];
  }
  return [
    { title: "Your work", items: [{ id: "mytasks", label: "My tasks", icon: CheckSquare }] },
    { title: "Collaboration", items: [{ id: "crossumoor", label: "Cross-umoor", icon: Share2 }] },
  ];
}
function defaultActiveForRole(role) {
  if (role === "leadership") return "dashboard";

  return "mytasks";
}

function Avatar({ name, size = 44, editable, ring, photo } ) {
  const src = photo || placeholderAvatar;
  return (
    <div
      className={`relative shrink-0 rounded-full overflow-hidden bg-teal-50 ${ring ? "ring-2 ring-amber-300" : ""}`}
      style={{ width: size, height: size }}
    >
      <img src={src} alt={name} className="w-full h-full object-cover" />
      {editable && (
        <button className="absolute -bottom-1 -right-1 w-5 h-5 rounded-full bg-white border border-stone-200 flex items-center justify-center text-stone-500 hover:text-teal-700" aria-label="Upload photo">
          <Upload size={11} />
        </button>
      )}
    </div>
  );
}

function Rosette({ size = 36 }) {
  const c = size / 2;
  const r = c - 5;
  const petals = Array.from({ length: 12 }, (_, i) => {
    const angle = (i * 30 * Math.PI) / 180;
    return { x: c + r * Math.sin(angle), y: c - r * Math.cos(angle) };
  });
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} role="img" aria-label="12 umoor rosette">
      <circle cx={c} cy={c} r={r + 3} fill="none" stroke="#b8862c" strokeWidth="0.75" opacity="0.5" />
      {petals.map((p, i) => (
        <rect key={i} x={p.x - 2.4} y={p.y - 2.4} width="4.8" height="4.8" rx="1" transform={`rotate(45 ${p.x} ${p.y})`} fill="#0f6e56" opacity={i % 2 === 0 ? 0.9 : 0.55} />
      ))}
      <circle cx={c} cy={c} r={r * 0.42} fill="#0f6e56" />
      <circle cx={c} cy={c} r={r * 0.42} fill="none" stroke="#f5c451" strokeWidth="1" />
    </svg>
  );
}

function StatusBadge({ status }) {
  return (
    <span className={`text-xs font-medium px-2 py-0.5 rounded-full border ${statusStyles[status] || "bg-stone-100 text-stone-600 border-stone-200"}`}>
      {status}
    </span>
  );
}

function MetricCard({ label, value, sub, tone = "teal" }) {
  const tones = {
    teal: "text-teal-800",
    amber: "text-amber-700",
    rose: "text-rose-700",
  };
  return (
    <div className="bg-white border border-stone-200 rounded-xl p-4">
      <p className="text-xs uppercase tracking-wide text-stone-500 mb-1">{label}</p>
      <p className={`text-2xl font-serif ${tones[tone]}`}>{value}</p>
      {sub && <p className="text-xs text-stone-400 mt-1">{sub}</p>}
    </div>
  );
}

function SectionHeader({ eyebrow, title, action }) {
  return (
    <div className="flex items-center justify-between mb-4">
      <div>
        {eyebrow && <p className="text-xs uppercase tracking-widest text-amber-700 font-medium mb-1">{eyebrow}</p>}
        <h1 className="text-xl font-serif text-stone-900">{title}</h1>
      </div>
      {action}
    </div>
  );
}

function PrimaryButton({ children, icon: Icon, onClick, disabled }) {
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      className={`inline-flex items-center gap-1.5 text-sm font-medium px-3.5 py-2 rounded-lg transition ${
        disabled ? "bg-stone-200 text-stone-400 cursor-not-allowed" : "bg-teal-800 text-white hover:bg-teal-900 active:scale-[0.98]"
      }`}
    >
      {Icon && <Icon size={15} />}
      {children}
    </button>
  );
}

function ListCard({ title, columns, rows, action }) {
  return (
    <div className="bg-white border border-stone-200 rounded-xl overflow-hidden">
      {title && (
        <div className="px-4 py-3 border-b border-stone-100 flex items-center justify-between">
          <p className="text-sm font-medium text-stone-800">{title}</p>
          {action}
        </div>
      )}
      <table className="w-full text-sm">
        <thead>
          <tr className="text-left text-xs text-stone-500 uppercase tracking-wide border-b border-stone-100">
            {columns.map((c) => (
              <th key={c} className="px-4 py-2 font-medium">{c}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.map((row, i) => (
            <tr key={i} className="border-b border-stone-50 last:border-0 hover:bg-stone-50/60">
              {row.map((cell, j) => (
                <td key={j} className="px-4 py-2.5 text-stone-700">{cell}</td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function GenericModule({ label, description, columns, rows, actionLabel }) {
  return (
    <div>
      <SectionHeader
        eyebrow="Mumin portal"
        title={label}
        action={actionLabel ? <PrimaryButton icon={Plus}>{actionLabel}</PrimaryButton> : null}
      />
      <p className="text-sm text-stone-500 mb-5">{description}</p>
      <ListCard columns={columns} rows={rows} />
    </div>
  );
}

function AdminDashboard({ onSelectUmoor, submissions }) {
  const totalBudget = umoorList.reduce((s, u) => s + u.budget, 0);
  const totalSpent = umoorList.reduce((s, u) => s + u.spent, 0);
  const totalTasks = umoorList.reduce((s, u) => s + u.tasks, 0);
  const totalPending = Object.values(submissions).flat().filter((r) => r.status === "Pending").length;
  return (
    <div>
      <SectionHeader eyebrow="Admin console" title="Jamaat overview" />
      <div className="grid grid-cols-1 sm:grid-cols-4 gap-3 mb-6">
        <MetricCard label="Open tasks" value={totalTasks} sub="across 12 umoor" />
        <MetricCard label="Mumin requests" value={totalPending} sub="awaiting action" tone="amber" />
        <MetricCard label="Reports due" value="3" sub="Al Vazarat format" tone="rose" />
        <MetricCard label="Budget used" value={`${Math.round((totalSpent/totalBudget)*100)}%`} sub={`$${totalSpent.toLocaleString()} of $${totalBudget.toLocaleString()}`} />
      </div>
      <p className="text-xs uppercase tracking-widest text-stone-500 mb-3">The 12 umoor</p>
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6">
        {umoorList.map((u) => {
          const Icon = u.icon;
          const pct = Math.round((u.spent / u.budget) * 100);
          const pending = (submissions[u.id] || []).filter((r) => r.status === "Pending").length;
          return (
            <button
              key={u.id}
              onClick={() => onSelectUmoor(u.id)}
              className="text-left bg-white border border-stone-200 rounded-xl p-3.5 hover:border-teal-300 hover:shadow-sm transition relative"
            >
              {pending > 0 && (
                <span className="absolute top-3 right-3 text-[10px] font-medium bg-amber-100 text-amber-800 rounded-full px-1.5 py-0.5">{pending} from mumineen</span>
              )}
              <div className="flex items-center gap-2 mb-2">
                <div className="w-8 h-8 rounded-lg bg-teal-50 flex items-center justify-center text-teal-800">
                  <Icon size={16} />
                </div>
                <div className="min-w-0">
                  <p className="text-sm font-medium text-stone-800 truncate">{u.name}</p>
                  <p className="text-xs text-stone-400 truncate">{u.sub}</p>
                </div>
              </div>
              <div className="flex items-center justify-between text-xs text-stone-500 mb-1">
                <span>{u.tasks} open tasks</span>
                <span>{pct}% budget spent</span>
              </div>
              <div className="h-1.5 bg-stone-100 rounded-full overflow-hidden mb-2">
                <div className="h-full bg-teal-700" style={{ width: `${pct}%` }} />
              </div>
              <div className="flex items-center justify-between text-xs text-stone-500 mb-1">
                <span>Annual goals</span>
                <span>{u.goalsDone}/{u.goals.length} · {goalPct(u)}%</span>
              </div>
              <div className="h-1.5 bg-stone-100 rounded-full overflow-hidden">
                <div className="h-full bg-amber-500" style={{ width: `${goalPct(u)}%` }} />
              </div>
            </button>
          );
        })}
      </div>
      <ListCard
        title="Recent activity"
        columns={["Umoor", "Activity", "By", "When"]}
        rows={[
          ["FMB & Niyaz", "Receipt submitted — catering, Ashara week 3", "Zainab", "2h ago"],
          ["Umoor Talimiyah", "Task marked done — madrasa attendance sheet", "Yusuf", "5h ago"],
          ["Umoor Dakheliyah", "New task — migrate nondh forms to app", "Hatim", "1d ago"],
          ["Umoor Maliyah", "Monthly report generated — June 2026", "Burhan", "2d ago"],
        ]}
      />
    </div>
  );
}

function SubmissionDetail({ record }) {
  const d = record.data;
  if (!d) return <p className="text-xs text-stone-400 italic">No detailed form data was captured for this submission.</p>;
  if (d.kaaraj) {
    // Raza araz for kaaraj — structured render matching the real form's sections.
    return (
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs">
        <div>
          <p className="text-[10px] uppercase tracking-widest text-stone-400 mb-1.5">Applicant</p>
          <p className="text-stone-700">{d.firstName} {d.lastName} · ITS {d.itsNumber || "—"}</p>
          <p className="text-stone-500">{d.email || "—"}</p>
          <p className="text-stone-500">{d.address || "—"}</p>
          <p className="text-stone-500 mt-1">Moharramaat: <span className={d.moharramaat === "Yes" ? "text-rose-600 font-medium" : "text-stone-600"}>{d.moharramaat}</span>{d.moharramaat === "Yes" && d.moharramaatDetail ? ` — ${d.moharramaatDetail}` : ""}</p>
          {d.shamilThanaar && <p className="text-stone-500">Shamil thanaar: {d.shamilThanaar}</p>}
        </div>
        <div>
          <p className="text-[10px] uppercase tracking-widest text-stone-400 mb-1.5">Kaaraj</p>
          <p className="text-stone-700">{d.kaaraj} · {d.venue}{d.venue === "Other" && d.venueOtherReason ? ` (${d.venueOtherReason})` : ""}</p>
          <p className="text-stone-500">Niyyat with Huzurala TUS: {d.niyyat}</p>
          {d.kaaraj === "Nikah" && <p className="text-stone-500">Nikah parhnar: {d.nikahParhnar}</p>}
          <p className="text-stone-500 mt-1">
            Date booked: {d.selectedIso ? new Date(d.selectedIso).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) : "not selected"}
          </p>
        </div>
        <div>
          <p className="text-[10px] uppercase tracking-widest text-stone-400 mb-1.5">Laagat & payment</p>
          <p className="text-stone-700">${d.laagat} via {d.paymentMode}</p>
          {d.paymentMode === "Check" && <p className="text-stone-500">Check #{d.checkNumber || "—"}, {d.checkDate || "no date"}</p>}
          {d.paymentMode === "Zelle" && <p className="text-stone-500">Zelle date: {d.zelleDate || "—"}</p>}
        </div>
        <div>
          <p className="text-[10px] uppercase tracking-widest text-stone-400 mb-1.5">Terms & signature</p>
          <p className={d.agreedTerms ? "text-emerald-700 font-medium" : "text-rose-600 font-medium"}>
            {d.agreedTerms ? "✓ Agreed to terms & conditions" : "✗ Terms & conditions not agreed"}
          </p>
          <p className="text-stone-500">Signed: {d.signature || "—"}</p>
        </div>
        <div className="col-span-2">
          <p className="text-[10px] uppercase tracking-widest text-stone-400 mb-1.5">Menu</p>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-x-3 gap-y-0.5">
            {Object.entries(d.menu || {}).map(([row, val]) => (
              <p key={row} className="text-stone-500 truncate">
                <span className="text-stone-400">{row}:</span> {val || <span className="text-rose-500">blank</span>}
              </p>
            ))}
          </div>
          {d.comments && <p className="text-stone-500 mt-1.5">Comments: {d.comments}</p>}
        </div>
      </div>
    );
  }
  // Generic fallback for any other captured form data.
  return (
    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 text-xs">
      {Object.entries(d).map(([k, v]) => (
        <p key={k} className="text-stone-500 truncate"><span className="text-stone-400">{k}:</span> {typeof v === "object" ? JSON.stringify(v) : String(v)}</p>
      ))}
    </div>
  );
}

function UmoorDetail({ umoor, requests, onUpdateStatus, role }) {
  const Icon = umoor.icon;
  const pct = Math.round((umoor.spent / umoor.budget) * 100);
  const pendingCount = requests.filter((r) => r.status === "Pending").length;
  const [expandedId, setExpandedId] = useState(null);
  const board = {
    "To do": ["Confirm venue for monthly majlis", "Draft volunteer roster"],
    "In progress": ["Update Al Vazarat report template", "Follow up on outstanding raza"],
    "Done": ["Send weekly reminder to team", "Close out April receipts"],
  };
  return (
    <div>
      <div className="flex items-center gap-3 mb-1">
        <div className="w-10 h-10 rounded-xl bg-teal-50 flex items-center justify-center text-teal-800">
          <Icon size={20} />
        </div>
        <div>
          <p className="text-xs uppercase tracking-widest text-amber-700 font-medium">{umoor.sub}</p>
          <h1 className="text-xl font-serif text-stone-900">{umoor.name}</h1>
        </div>
      </div>
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 my-5">
        <MetricCard label="Open tasks" value={umoor.tasks} />
        <MetricCard label="Budget" value={`$${umoor.budget.toLocaleString()}`} sub={`$${umoor.spent.toLocaleString()} spent (${pct}%)`} />
        <MetricCard label="Mumin requests" value={requests.length} sub={`${pendingCount} awaiting action`} tone={pendingCount ? "amber" : "teal"} />
      </div>
      <div className="bg-white border border-stone-200 rounded-xl p-4 mb-6">
        <div className="flex items-center justify-between mb-3">
          <p className="text-sm font-medium text-stone-800">Incoming from mumin side</p>
          <span className="text-[11px] text-stone-400">Synced live from the {umoor.name} mumin page</span>
        </div>
        {requests.length === 0 ? (
          <p className="text-sm text-stone-400">No mumin submissions yet for this umoor.</p>
        ) : (
          <div className="space-y-2">
            {requests.map((r) => {
              const isExpanded = expandedId === r.id;
              const isRaza = r.data && r.data.kaaraj;
              const termsOk = !isRaza || r.data.agreedTerms;
              return (
                <div key={r.id} className="border border-stone-100 rounded-lg overflow-hidden">
                  <button
                    onClick={() => setExpandedId(isExpanded ? null : r.id)}
                    className="w-full flex items-center justify-between px-3 py-2.5 text-left hover:bg-stone-50 transition"
                  >
                    <div className="min-w-0 flex items-center gap-2">
                      <ChevronRight size={12} className={`text-stone-400 shrink-0 transition-transform ${isExpanded ? "rotate-90" : ""}`} />
                      <div className="min-w-0">
                        <p className="text-sm text-stone-800 truncate">{r.title}</p>
                        <p className="text-[11px] text-stone-400">{r.by} · {r.date}{r.data ? " · full form on file" : ""}</p>
                      </div>
                    </div>
                    <StatusBadge status={r.status} />
                  </button>
                  {isExpanded && (
                    <div className="border-t border-stone-100 px-3 py-3 bg-stone-50/50">
                      <SubmissionDetail record={r} />
                      <div className="flex items-center gap-2 mt-3 pt-3 border-t border-stone-100">
                        {r.status === "Pending" && (
                          <>
                            <button
                              disabled={!termsOk}
                              onClick={() => onUpdateStatus(r.id, isRaza ? "Raza Granted — Pending Signature" : "Approved")}
                              className={`text-xs rounded-full px-2.5 py-1 border ${
                                termsOk ? "text-emerald-700 border-emerald-200 hover:bg-emerald-50" : "text-stone-300 border-stone-200 cursor-not-allowed"
                              }`}
                            >
                              {isRaza ? "Approve → Generate Raza Granted" : "Approve"}
                            </button>
                            <button onClick={() => onUpdateStatus(r.id, "Rejected")} className="text-xs text-rose-700 border border-rose-200 rounded-full px-2.5 py-1 hover:bg-rose-50">Decline</button>
                            {isRaza && !termsOk && <span className="text-[11px] text-rose-600">Can't approve — mumin hasn't agreed to terms & conditions.</span>}
                          </>
                        )}
                        {r.status === "Raza Granted — Pending Signature" && (
                          <div className="w-full bg-purple-50 border border-purple-200 rounded-lg p-3">
                            <p className="text-xs text-purple-800 font-medium mb-1">Raza Granted — awaiting Amil Saheb's signature</p>
                            <p className="text-[11px] text-purple-600 mb-2">{r.data?.firstName} {r.data?.lastName} is cleared for {r.data?.kaaraj} on {r.data?.selectedIso ? new Date(r.data.selectedIso).toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" }) : "the selected date"}. Menu and terms have been reviewed by the coordinator.</p>
                            {role === "leadership" ? (
                              <button onClick={() => onUpdateStatus(r.id, "Raza Granted — Signed")} className="text-xs bg-purple-700 text-white rounded-full px-3 py-1.5 hover:bg-purple-800">
                                Sign as Amil Saheb
                              </button>
                            ) : (
                              <p className="text-[11px] text-stone-400 italic">Only Amil Saheb / Asst Amil Saheb can sign to finalize.</p>
                            )}
                          </div>
                        )}
                        {r.status === "Raza Granted — Signed" && (
                          <div className="w-full bg-emerald-50 border border-emerald-200 rounded-lg p-3">
                            <p className="text-xs text-emerald-800 font-medium">✓ Raza Granted — signed by Amil Saheb</p>
                            <p className="text-[11px] text-emerald-600">{r.data?.kaaraj} for {r.data?.firstName} {r.data?.lastName} is confirmed and finalized.</p>
                          </div>
                        )}
                        {(r.status === "Approved" || r.status === "Rejected") && (
                          <StatusBadge status={r.status} />
                        )}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
      <div className="bg-white border border-stone-200 rounded-xl p-4 mb-6">
        <div className="flex items-center justify-between text-sm mb-1.5">
          <span className="font-medium text-stone-800">Annual goals progress</span>
          <span className="text-stone-500">{umoor.goalsDone}/{umoor.goals.length} · {goalPct(umoor)}%</span>
        </div>
        <div className="h-2 bg-stone-100 rounded-full overflow-hidden mb-3">
          <div className="h-full bg-amber-500" style={{ width: `${goalPct(umoor)}%` }} />
        </div>
        <p className="text-[11px] text-stone-400 mb-2">S.M.A.R.T. goals per the 12 umoor handbook — set in consultation with Amil Saheb.</p>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-1.5">
          {umoor.goals.map((g, i) => (
            <div key={g} className="flex items-start gap-1.5 text-xs">
              <CheckSquare size={13} className={`shrink-0 mt-0.5 ${i < umoor.goalsDone ? "text-teal-700" : "text-stone-300"}`} />
              <span className={i < umoor.goalsDone ? "text-stone-600" : "text-stone-400"}>{g}</span>
            </div>
          ))}
        </div>
      </div>
      <p className="text-xs uppercase tracking-widest text-stone-500 mb-3">Implementation modules</p>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-2.5 mb-6">
        {umoor.modules.map((m) => (
          <div key={m} className="flex items-center gap-2 bg-white border border-stone-200 rounded-lg px-3 py-2.5 text-sm text-stone-700">
            <ChevronRight size={13} className="text-teal-700 shrink-0" />
            {m}
          </div>
        ))}
        {umoor.id === "amlaak" && (
          <div className="flex items-center gap-2 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2.5 text-sm text-amber-800 col-span-2">
            <Image size={14} className="shrink-0" />
            Property photos and site documentation live in the umoor gallery — see Gallery in the sidebar.
          </div>
        )}
      </div>
      {umoor.organizations && (
        <>
          <p className="text-xs uppercase tracking-widest text-stone-500 mb-3">Jamaat organizations</p>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2.5 mb-6">
            {umoor.organizations.map((org) => (
              <div key={org.name} className="bg-white border border-stone-200 rounded-lg px-3 py-2.5">
                <p className="text-sm font-medium text-stone-800">{org.name}</p>
                <p className="text-xs text-stone-400 mb-1.5">{org.sub}</p>
                {org.children && (
                  <div className="flex flex-wrap gap-1">
                    {org.children.map((c) => (
                      <span key={c} className="text-[11px] bg-teal-50 text-teal-800 rounded-full px-2 py-0.5">{c}</span>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
        </>
      )}
      <p className="text-xs uppercase tracking-widest text-stone-500 mb-3">Task board</p>
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6">
        {Object.entries(board).map(([col, items]) => (
          <div key={col} className="bg-stone-50 border border-stone-200 rounded-xl p-3">
            <p className="text-xs font-medium text-stone-500 mb-2">{col}</p>
            <div className="space-y-2">
              {items.map((t, i) => (
                <div key={i} className="bg-white border border-stone-200 rounded-lg px-3 py-2 text-sm text-stone-700">{t}</div>
              ))}
            </div>
          </div>
        ))}
      </div>
      <ListCard
        title="Recent receipts"
        columns={["Description", "Amount", "Submitted by", "Status"]}
        rows={[
          ["Supplies — weekly setup", "$184.20", "Sakina", <StatusBadge status="Approved" />],
          ["Transport — guest speaker", "$60.00", "Idris", <StatusBadge status="Pending" />],
        ]}
      />
    </div>
  );
}

    ["Confirm venue for monthly majlis", "Umoor Deeniyah", "Aliasgar", <StatusBadge status="Open" />],

  const filtered = filter === "all" ? rows : rows.filter((r) => r[3].props.status.toLowerCase().replace(" ", "") === filter);

    <div>
      <SectionHeader
        eyebrow="Operations"
        title="Task manager"
        action={<PrimaryButton icon={Plus}>New task</PrimaryButton>}

        {["all", "open", "inprogress", "done"].map((f) => (
          <button
            key={f}

}

              <div key={p.name} className={`flex items-center gap-2.5 px-2.5 py-2 rounded-lg ${p.you ? "bg-teal-50" : ""}`}>
                <span className="text-xs text-stone-400 w-4">{i + 1}</span>
                <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-medium ${p.you ? "bg-teal-800 text-white" : "bg-stone-100 text-stone-600"}`}>
                  {p.name.split(" ").map((n) => n[0]).slice(0,2).join("")}
                </div>
                <div className="min-w-0 flex-1">
                  <p className="text-sm text-stone-800 truncate">{p.name}</p>
                  <p className="text-[11px] text-stone-400">{p.umoor}</p>
                </div>
                <span className="text-sm font-medium text-stone-700">{p.pts}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="bg-white border border-stone-200 rounded-xl p-4">
          <p className="text-sm font-medium text-stone-800 mb-3">Certificates</p>
          <div className="space-y-2">
            {["Q2 2026 — Perfect attendance", "2025 — Annual khidmat recognition"].map((c) => (
              <div key={c} className="flex items-center justify-between border border-stone-200 rounded-lg px-3 py-2.5">
                <span className="text-sm text-stone-700">{c}</span>
                <button className="text-teal-700 text-xs inline-flex items-center gap-1"><Upload size={12} className="rotate-180" />Download</button>
              </div>
            ))}
          </div>
          <p className="text-xs text-stone-400 mt-3">Certificates generate automatically when a badge or tier milestone is reached, signed off by the umoor coordinator.</p>
        </div>
      </div>
    </div>
  );
}

function BoardOfDirectors() {

const HIJRI_KABISA_REMAINDERS = [2, 5, 8, 10, 13, 16, 19, 21, 24, 27, 29];
const HIJRI_DAYS_IN_YEAR = [30, 59, 89, 118, 148, 177, 207, 236, 266, 295, 325];
const HIJRI_DAYS_IN_30_YEARS = [
  354, 708, 1063, 1417, 1771, 2126, 2480, 2834, 3189, 3543,
  3898, 4252, 4606, 4961, 5315, 5669, 6024, 6378, 6732, 7087,
  7441, 7796, 8150, 8504, 8859, 9213, 9567, 9922, 10276, 10631,
];
function isHijriKabisa(year) {
  return HIJRI_KABISA_REMAINDERS.includes(((year % 30) + 30) % 30);
}
function isJulianDate(date) {
  if (date.getFullYear() < 1582) return true;
  if (date.getFullYear() === 1582) {
    if (date.getMonth() < 9) return true;
    if (date.getMonth() === 9 && date.getDate() < 5) return true;
  }
  return false;
}
function gregorianToAJD(date) {
  let year = date.getFullYear();
  let month = date.getMonth() + 1;
  const day = date.getDate();

  if (isJulianDate(date)) {
    b = 0;
  } else {
    a = Math.floor(year / 100);
    b = 2 - a + Math.floor(a / 4);

  let year = Math.round(y30 * 30.0 + i);
  if (i > 0) left -= HIJRI_DAYS_IN_30_YEARS[i - 1];
  i = 0;
  while (left > HIJRI_DAYS_IN_YEAR[i]) i += 1;

function isoDate(d) {
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}
function thaaliWeekDates() {
  // Last 7 days including today.
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(TODAY);
    d.setDate(d.getDate() - (6 - i));
    return d;
  });
}
const initialThaaliLog = (() => {
  const log = {};
  thaaliWeekDates().forEach((d, i) => {
    log[isoDate(d)] = i < 6; // past 6 days picked up, today not yet
  });
  return log;
})();

      </div>

              className={`rounded-lg border p-2 flex flex-col items-center gap-1 transition ${

function MiqaatCalendar() {
  const [cursor, setCursor] = useState(new Date(2026, 6, 1));
  const [hijriDays, setHijriDays] = useState(null);
  const [status, setStatus] = useState("loading");
  const year = cursor.getFullYear();
  const month = cursor.getMonth();
  const monthLabel = cursor.toLocaleString("en-US", { month: "long", year: "numeric" });

  useEffect(() => {
    let cancelled = false;
    setStatus("loading");
    const pad = (n) => String(n).padStart(2, "0");
    const firstOfMonth = `${year}-${pad(month + 1)}-01`;
    fetch(`https://mumineen.org/api/v1/calendar/${firstOfMonth}?greg=true`, {
      headers: { "Content-Type": "application/json", Accept: "application/json" },
    })
      .then((res) => { if (!res.ok) throw new Error("bad response"); return res.json(); })
      .then((data) => {
        if (cancelled) return;
        const dayMap = {};
        (data.days || []).forEach((d) => {
          const [hy, hm, hd] = d.hijri_date.split("-");
          dayMap[d.gregorian_date] = { day: parseInt(hd, 10), month: parseInt(hm, 10) - 1, year: parseInt(hy, 10) };
        });
        setHijriDays(Object.keys(dayMap).length ? dayMap : null);
        setStatus("live");
      })
      .catch(() => {
        if (cancelled) return;
        setHijriDays(null);
        setStatus("fallback");
      });
    return () => { cancelled = true; };
  }, [year, month]);

  const dim = daysInMonth(year, month);
  const startDay = firstWeekday(year, month);
  const cells = [];
  for (let i = 0; i < startDay; i++) cells.push(null);
  for (let d = 1; d <= dim; d++) cells.push(d);
  const pad2 = (n) => String(n).padStart(2, "0");
  const isoFor = (d) => `${year}-${pad2(month + 1)}-${pad2(d)}`;
  const todayIso = `${TODAY.getFullYear()}-${pad2(TODAY.getMonth() + 1)}-${pad2(TODAY.getDate())}`;

  const hijriAt = (d) => (hijriDays && hijriDays[isoFor(d)]) ? hijriDays[isoFor(d)] : exactHijriForDate(year, month, d);
  const firstH = hijriAt(1);
  const lastH = hijriAt(dim);
  const hijriMonthLabel =
    firstH && lastH
      ? firstH.month === lastH.month
        ? `${hijriMonthNames[firstH.month]} ${firstH.year}H`
        : `${hijriMonthNames[firstH.month]}\u2013${hijriMonthNames[lastH.month]} ${lastH.year}H`
      : "";

  // Build this month's events from the real local dataset, matched against each
  // cell's Hijri date (live-synced when possible, computed locally otherwise).
  const dayEvents = cells.map((d) => {
    if (d === null) return null;
    const h = hijriAt(d);
    return getMiqaatsForHijri(h.month, h.day, h.year).map((m) => m.title);
  });
  const upcoming = [];
  cells.forEach((d, i) => {
    if (d === null) return;
    const iso = isoFor(d);
    if (new Date(iso) < TODAY) return;
    (dayEvents[i] || []).forEach((title) => upcoming.push({ date: iso, title }));
  });

  return (
    <div className="bg-white border border-stone-200 rounded-xl p-3 mb-6">
      <div className="flex items-center justify-between mb-0.5">
        <button onClick={() => setCursor(new Date(year, month - 1, 1))} className="w-6 h-6 rounded-md hover:bg-stone-100 text-stone-400 flex items-center justify-center shrink-0" aria-label="Previous month">
          <ChevronRight size={13} className="rotate-180" />
        </button>
        <div className="text-center min-w-0">
          <p className="text-sm font-serif text-blue-800 leading-tight truncate">{monthLabel}</p>
          <p className="text-[10px] text-red-600 leading-tight truncate">{hijriMonthLabel}{!hijriDays ? "*" : ""}</p>
        </div>
        <button onClick={() => setCursor(new Date(year, month + 1, 1))} className="w-6 h-6 rounded-md hover:bg-stone-100 text-stone-400 flex items-center justify-center shrink-0" aria-label="Next month">
          <ChevronRight size={13} />
        </button>
      </div>
      <p className="text-[9px] text-stone-300 text-center mb-2">
        {status === "loading" && "syncing..."}
        {status === "live" && "live · mumineen.org"}
        {status === "fallback" && "offline · local calc"}
      </p>
      <div className="grid grid-cols-7 mb-0.5">
        {["S", "M", "T", "W", "T", "F", "S"].map((d, i) => (
          <div key={i} className="text-center text-[9px] text-stone-400 font-medium py-0.5">{d}</div>
        ))}
      </div>
      <div className="grid grid-cols-7">
        {cells.map((d, i) => {
          if (d === null) return <div key={i} />;
          const iso = isoFor(d);
          const isToday = iso === todayIso;
          const hijriDay = hijriAt(d).day;
          const titles = dayEvents[i] || [];
          return (
            <div key={i} title={titles.join(", ")} className="aspect-square relative flex items-center justify-center">
              <span className="absolute top-0 right-0.5 text-[7px] text-red-600 leading-none">{hijriDay}</span>
              <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[11px] font-medium transition ${
                isToday ? "bg-teal-700 text-white" : "text-blue-700 hover:bg-stone-100"
              }`}>
                {d}
              </div>
              {titles.length > 0 && (
                <span className={`absolute bottom-0 w-1 h-1 rounded-full ${isToday ? "bg-amber-300" : "bg-amber-500"}`} />
              )}
            </div>
          );
        })}
      </div>
      {!hijriDays && (
        <p className="text-[9px] text-stone-300 mt-2 leading-snug">* Hijri date computed locally (Dawat calendar algorithm).</p>
      )}
      <div className="mt-3 pt-3 border-t border-stone-100 space-y-1.5">
        <p className="text-[10px] uppercase tracking-widest text-stone-400 mb-1.5">Upcoming</p>
        {upcoming.length ? upcoming.slice(0, 4).map((e) => (
          <div key={e.date + e.title} className="flex items-start justify-between gap-2 text-[11px]">
            <span className="text-stone-700 leading-snug">{e.title}</span>
            <span className="text-stone-400 shrink-0">
              {new Date(e.date).toLocaleDateString("en-US", { month: "short", day: "numeric" })}</span>
          </div>
        )) : <p className="text-[11px] text-stone-400">No more miqaats this month.</p>}
      </div>
    </div>
  );
}

function BookingCalendar({ bookedDates, onPick, selectedIso }) {
  const [cursor, setCursor] = useState(new Date(2026, 6, 1));
  const year = cursor.getFullYear();
  const month = cursor.getMonth();
  const monthLabel = cursor.toLocaleString("en-US", { month: "long", year: "numeric" });
  const dim = daysInMonth(year, month);
  const startDay = firstWeekday(year, month);
  const cells = [];
  for (let i = 0; i < startDay; i++) cells.push(null);
  for (let d = 1; d <= dim; d++) cells.push(d);
  const pad2 = (n) => String(n).padStart(2, "0");
  const isoFor = (d) => `${year}-${pad2(month + 1)}-${pad2(d)}`;

  return (
    <div className="bg-stone-50 border border-stone-200 rounded-xl p-3">
      <div className="flex items-center justify-between mb-2">
        <button onClick={() => setCursor(new Date(year, month - 1, 1))} className="w-6 h-6 rounded-md hover:bg-white text-stone-400 flex items-center justify-center" aria-label="Previous month">
          <ChevronRight size={13} className="rotate-180" />
        </button>
        <span className="text-xs font-medium text-stone-700">{monthLabel}</span>
        <button onClick={() => setCursor(new Date(year, month + 1, 1))} className="w-6 h-6 rounded-md hover:bg-white text-stone-400 flex items-center justify-center" aria-label="Next month">
          <ChevronRight size={13} />
        </button>
      </div>
      <div className="grid grid-cols-7 mb-0.5">
        {["S", "M", "T", "W", "T", "F", "S"].map((d, i) => (
          <div key={i} className="text-center text-[9px] text-stone-400 font-medium py-0.5">{d}</div>
        ))}
      </div>
      <div className="grid grid-cols-7 gap-0.5">
        {cells.map((d, i) => {
          if (d === null) return <div key={i} />;
          const iso = isoFor(d);
          const isPast = new Date(iso) < TODAY;
          const h = exactHijriForDate(year, month, d);
          const miqaats = getMiqaatsForHijri(h.month, h.day, h.year);
          const booking = bookedDates[iso];
          const isSelected = iso === selectedIso;
          const blocked = isPast || miqaats.length > 0 || !!booking;
          let title = "";
          if (miqaats.length) title = `Miqaat: ${miqaats.map((m) => m.title).join(", ")}`;
          else if (booking) title = `Booked — ${booking.kaaraj} (${booking.by})`;

          return (
            <button
              key={i}
              type="button"
              disabled={blocked}
              title={title}
              onClick={() => onPick(iso)}
              className={`aspect-square rounded-md flex flex-col items-center justify-center text-[10px] gap-0 transition ${
                isSelected
                  ? "bg-teal-700 text-white font-medium"
                  : miqaats.length
                  ? "bg-amber-100 text-amber-700 cursor-not-allowed"
                  : booking
                  ? "bg-rose-100 text-rose-500 cursor-not-allowed line-through"
                  : isPast
                  ? "text-stone-300 cursor-not-allowed"
                  : "bg-white text-stone-700 hover:bg-teal-50 border border-stone-200"
              }`}
            >
              {d}
            </button>
          );
        })}

              ))}
            </div>
            <TextField label="Additional comments (Raza / time / location / format / laagat)" span={4} value={f.comments} onChange={onInput("comments")} />
            <label className="flex items-start gap-2 text-xs text-stone-600">
              <input type="checkbox" className="mt-0.5 rounded border-stone-300" checked={f.agreedTerms} onChange={(e) => set("agreedTerms")(e.target.checked)} />

            </label>
            <TextField label="Signature (type full name)" span={2} value={f.signature} onChange={onInput("signature")} />
          </FormStep>
        )}
      </div>

      <div className="flex items-center justify-between">
        <button
          onClick={() => (step === 1 ? onCancel() : setStep(step - 1))}
          className="text-sm text-stone-500 border border-stone-200 rounded-lg px-4 py-2 hover:bg-stone-50 transition"
        >
          {step === 1 ? "Cancel" : "Back"}
        </button>
        {step < totalSteps ? (
          <PrimaryButton onClick={() => setStep(step + 1)} disabled={step === 3 && !selectedIso}>Continue</PrimaryButton>
        ) : (
          <PrimaryButton onClick={() => onSubmit({ ...f, laagat, selectedIso })}>Submit application</PrimaryButton>
        )}
      </div>
    </div>
  );
}

        {step === 7 && (

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <TextField label="Applicant signature (type full name)" />
              <TextField label="Spouse signature (if applicable)" />
            </div>
            <div className="space-y-2 mt-2">
              <label className="flex items-start gap-2 text-xs text-stone-600">
                <input type="checkbox" className="mt-0.5 rounded border-stone-300" />
                The above information has been filled by me and is true to the best of my knowledge.
              </label>
              <label className="flex items-start gap-2 text-xs text-stone-600">
                <input type="checkbox" className="mt-0.5 rounded border-stone-300" />
                I understand any concealment or misinformation will debar me from receiving Qardan Hasana.
              </label>
              <label className="flex items-start gap-2 text-xs text-stone-600">
                <input type="checkbox" className="mt-0.5 rounded border-stone-300" />
                I authorize Anjuman-e-Qutbi's Qardan Hasana Scheme to contact me by SMS or email regarding this application.
              </label>
            </div>
            <p className="text-[11px] text-stone-400 mt-2">Completed applications are reviewed by Janab Khuzaima Bhaisaheb Nomani, Amil Saheb, Anjuman-e-Qutbi Orange County.</p>
          </FormStep>
        )}
      </div>

      <div className="flex items-center justify-between">
        <button
          onClick={() => (step === 1 ? onCancel() : setStep(step - 1))}
          className="text-sm text-stone-500 border border-stone-200 rounded-lg px-4 py-2 hover:bg-stone-50 transition"
        >
          {step === 1 ? "Cancel" : "Back"}
        </button>
        {step < totalSteps ? (
          <PrimaryButton onClick={() => setStep(step + 1)}>Continue</PrimaryButton>
        ) : (
          <PrimaryButton onClick={() => onSubmit(amount)}>Submit application</PrimaryButton>
        )}
      </div>
    </div>
  );
}

function App() {
  const [mode, setMode] = useState("admin");
  const [role, setRole] = useState("leadership");
  const [active, setActive] = useState("dashboard");
  const [navOpen, setNavOpen] = useState(true);
  const [submissions, setSubmissions] = useState(initialSubmissions);
  const [activeForm, setActiveForm] = useState(null);
  const [thaaliLog, setThaaliLog] = useState(initialThaaliLog);
  function toggleThaali(iso) {
    setThaaliLog((prev) => ({ ...prev, [iso]: !prev[iso] }));
  }
  const [bookedDates, setBookedDates] = useState({
    "2026-07-24": { kaaraj: "Nikah", by: "Rangwala family" },
    "2026-08-02": { kaaraj: "Aqiqa", by: "Petiwala family" },
  });
  const [selectedKaarajDate, setSelectedKaarajDate] = useState(null);
  const [khabargiriPosts, setKhabargiriPosts] = useState([
    { id: "kg-1", type: "Need help", category: "Groceries", description: "Looking for someone to pick up weekly groceries for an elderly couple in the jamaat who live alone nearby.", by: "Fatema Rangwala", date: "Jul 15, 2026", status: "Open" },
    { id: "kg-2", type: "Offering help", category: "Transportation", description: "Have a car and free most weekday evenings — happy to give rides to majlis or appointments for anyone who needs it.", by: "Idris Saifee", date: "Jul 14, 2026", status: "Open" },
    { id: "kg-3", type: "Need help", category: "Household help", description: "Need a hand moving a couch and a few boxes this weekend — nothing heavy-duty, just an extra pair of hands.", by: "Zainab Petiwala", date: "Jul 12, 2026", status: "Claimed", claimedBy: "Yusuf Ratlamwala" },
  ]);
  function addKhabargiriPost(post) {
    setKhabargiriPosts((prev) => [
      { id: `kg-${Date.now()}`, by: "Hatim", date: "Jul 16, 2026", status: "Open", ...post },
      ...prev,
    ]);
  }
  function claimKhabargiriPost(id) {
    setKhabargiriPosts((prev) => prev.map((p) => (p.id === id ? { ...p, status: "Claimed", claimedBy: "Hatim" } : p)));
  }

  const sections = mode === "admin" ? getAdminSections(role) : muminSections;
  const umoor = umoorList.find((u) => u.id === active);

  function switchMode(m) {
    setMode(m);
    setActive(m === "admin" ? defaultActiveForRole(role) : "home");
  }
  function switchRole(r) {
    setRole(r);
    setActive(defaultActiveForRole(r));
  }
  function addSubmission(umoorId, action) {
    const record = { id: `${umoorId}-${Date.now()}`, title: action.title, by: "Hatim", date: "Jul 16, 2026", status: "Pending", data: action.data || null };
    setSubmissions((prev) => {
      const next = { ...prev, [umoorId]: [record, ...(prev[umoorId] || [])] };
      if (action.linksToMaliyah) {
        const laagatRecord = {
          id: `maliyah-${Date.now()}`,
          title: `Laagat payment — ${action.title}`,
          by: "Hatim",
          date: "Jul 16, 2026",
          status: "Pending",
          linkedFrom: `${umoorId}:${record.id}`,
        };
        next.maliyah = [laagatRecord, ...(prev.maliyah || [])];
      }
      return next;
    });
  }
  function updateSubmissionStatus(umoorId, id, status) {
    setSubmissions((prev) => ({
      ...prev,
      [umoorId]: prev[umoorId].map((r) => (r.id === id ? { ...r, status } : r)),
    }));
  }

  function renderContent() {
    if (mode === "admin") {
      if (active === "dashboard" && role === "leadership") return <AdminDashboard onSelectUmoor={setActive} submissions={submissions} />;
      if (active === "tasks") return <TaskManager />;
      if (active === "reimbursements") return <Reimbursements />;
      if (active === "reports") return <Reports />;
      if (active === "meetings") return <MeetingMinutes />;
      if (active === "treasury" && role === "treasurer") return <TreasuryOverview />;
      if (active === "team" && role === "leadership") return <TeamAccess />;
      if (active === "gallery") return <AdminGallery />;
      if (active === "mytasks") return <MyTasks />;
      if (active === "crossumoor") return <CrossUmoor canStart={role !== "member"} />;
      if (umoor) return (
        <UmoorDetail
          umoor={umoor}
          requests={submissions[umoor.id] || []}
          onUpdateStatus={(id, status) => updateSubmissionStatus(umoor.id, id, status)}
          role={role}
        />
      );
    } else {
      if (activeForm === "qardanHasana") {
        return (
          <QardanHasanaForm
            onCancel={() => setActiveForm(null)}
            onSubmit={(amount) => {
              addSubmission("iqtesadiyah", { title: `Qardan Hasana application — $${amount || "0"}`, type: "Apply" });
              setActiveForm(null);
            }}
          />
        );
      }
      if (activeForm === "razaKaaraj") {
        return (
          <RazaKaarajForm
            onCancel={() => { setActiveForm(null); setSelectedKaarajDate(null); }}

              }
              const dateLabel = selectedKaarajDate

              addSubmission("deeniyah", { title: `Raza araz for kaaraj — ${kaaraj} (${dateLabel})`, type: "Request", linksToMaliyah: true, data: fullData });
              setActiveForm(null);
              setSelectedKaarajDate(null);
            }}
          />
        );
      }
      if (active === "home") return <MuminHome thaaliLog={thaaliLog} submissions={submissions} />;
      if (active === "gallery") return <MuminGallery />;
      if (active === "rewards") return <KhidmatRewards />;
      if (active === "board") return <BoardOfDirectors />;
      if (umoor) return (
        <MuminUmoorDetail
          umoor={umoor}
          requests={submissions[umoor.id] || []}
          onSubmit={(action) => addSubmission(umoor.id, action)}
          onOpenForm={(formId) => setActiveForm(formId)}
          thaaliLog={thaaliLog}
          onToggleThaali={toggleThaali}
          khabargiriPosts={khabargiriPosts}
          onAddKhabargiriPost={addKhabargiriPost}
          onClaimKhabargiriPost={claimKhabargiriPost}
        />
      );
      const cfg = muminModuleConfig[active];
      if (cfg) return <GenericModule {...cfg} />;
    }
    return null;
  }

  return (
    <div className="w-full min-h-[640px] bg-stone-50 font-sans flex" style={{ fontFamily: "'Inter', system-ui, sans-serif" }}>

      {navOpen && (
        <>
          <div className="fixed inset-0 bg-black/30 z-30 md:hidden" onClick={() => setNavOpen(false)} />
          <aside className="fixed md:relative inset-y-0 left-0 z-40 w-72 md:w-60 shrink-0 bg-white border-r border-stone-200 flex flex-col shadow-xl md:shadow-none">
          <div className="px-4 py-4 border-b border-stone-100">
            <div className="flex items-center gap-2 mb-3">
              <div className="w-9 h-9 rounded-lg bg-teal-50 flex items-center justify-center shrink-0">
                <Rosette size={26} />
              </div>
              <div>
                <p className="text-sm font-serif text-stone-900 leading-none">Anjuman e Qutbi</p>
                <p className="text-[11px] text-stone-400">Orange County · 12 Umoor</p>
              </div>
            </div>
            <div className="flex bg-stone-100 rounded-lg p-0.5">
              <button
                onClick={() => switchMode("admin")}
                className={`flex-1 text-xs font-medium py-1.5 rounded-md transition ${mode === "admin" ? "bg-white shadow-sm text-teal-800" : "text-stone-500"}`}
              >
                Admin
              </button>
              <button
                onClick={() => switchMode("mumin")}
                className={`flex-1 text-xs font-medium py-1.5 rounded-md transition ${mode === "mumin" ? "bg-white shadow-sm text-teal-800" : "text-stone-500"}`}
              >
                Mumin
              </button>
            </div>
            {mode === "admin" && (
              <select
                value={role}
                onChange={(e) => switchRole(e.target.value)}
                className="w-full mt-2 border border-stone-200 rounded-lg px-2 py-1.5 text-xs text-stone-600"
              >
                {roles.map((r) => <option key={r.id} value={r.id}>{r.label}</option>)}
              </select>
            )}
          </div>
          <nav className="flex-1 overflow-y-auto px-2 py-3">
            {sections.map((section) => (
              <div key={section.title} className="mb-4">
                <p className="text-[10px] uppercase tracking-widest text-stone-400 px-2 mb-1.5">{section.title}</p>
                <div className="space-y-0.5">
                  {section.items.map((item) => {
                    const Icon = item.icon;
                    const isActive = active === item.id;
                    return (
                      <button
                        key={item.id}
                        onClick={() => { setActive(item.id); if (window.innerWidth < 768) setNavOpen(false); }}
                        className={`w-full flex items-center gap-2 px-2 py-1.5 rounded-lg text-sm text-left transition ${
                          isActive ? "bg-teal-50 text-teal-800 font-medium" : "text-stone-600 hover:bg-stone-50"
                        }`}
                      >
                        {Icon && <Icon size={15} className="shrink-0" />}
                        <span className="truncate">{item.label}</span>
                        {isActive && <ChevronRight size={13} className="ml-auto shrink-0" />}
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </nav>
        </aside>
        </>
      )}

      <div className="flex-1 flex flex-col min-w-0">
        <header className="h-14 shrink-0 border-b border-stone-200 bg-white flex items-center justify-between px-4">
          <div className="flex items-center gap-3">
            <button onClick={() => setNavOpen(!navOpen)} className="text-stone-400 hover:text-stone-600">
              {navOpen ? <X size={17} /> : <Menu size={17} />}
            </button>
            <div className="flex items-center gap-1.5 text-stone-400 text-sm">
              <Search size={15} />
              <span className="hidden sm:inline text-xs">Search {mode === "admin" ? "tasks, receipts, reports" : "modules, events"}...</span>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <button
              onClick={() => switchMode(mode === "admin" ? "mumin" : "admin")}
              className="flex items-center gap-1.5 text-xs text-stone-500 border border-stone-200 rounded-full px-2.5 py-1 hover:border-teal-300"
            >
              <ArrowLeftRight size={12} />
              View as {mode === "admin" ? "mumin" : "admin"}
            </button>
            <div className="w-7 h-7 rounded-full bg-amber-100 text-amber-800 text-xs font-medium flex items-center justify-center">HR</div>
          </div>
        </header>
        <main className="flex-1 overflow-y-auto p-4 sm:p-6">{renderContent()}</main>
      </div>
    </div>
  );
}

const root = createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
